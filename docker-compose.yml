name: medical-he

services:

  compute_server:
    build:
      context: .
      dockerfile: Dockerfile
      target: compute_server
    image: medical-he/compute_server:latest
    container_name: medical_compute_server
    ports:
      - "5002:5002"
    networks:
      - mednet
    restart: unless-stopped

  doctor_backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: doctor_backend
    image: medical-he/doctor_backend:latest
    container_name: medical_doctor_backend
    ports:
      - "5001:5001"
    environment:
      - COMPUTE_SERVER_URL=http://compute_server:5002
    depends_on:
      compute_server:
        condition: service_healthy
    networks:
      - mednet
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: medical-he/frontend:latest
    container_name: medical_frontend
    ports:
      - "3000:80"
    depends_on:
      doctor_backend:
        condition: service_healthy
    networks:
      - mednet
    restart: unless-stopped

networks:
  mednet:
    name: medical_he_network
    driver: bridge
